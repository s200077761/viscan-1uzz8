<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ViScan - Iris Analysis with ChatGPT-style Interface">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#10a37f">
  <link rel="manifest" href="/manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
  
  <title>ViScan - Iris Analysis</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Marked.js for Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <!-- Highlight.js for code syntax -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="/src/styles/main.css">
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            'chatgpt-green': '#10a37f',
            'iris-indigo': '#6366f1',
            'dark-bg': '#212121',
            'dark-chat': '#343541',
            'light-bg': '#ffffff',
            'light-chat': '#f7f7f8'
          }
        }
      }
    }
  </script>
</head>
<body class="dark bg-dark-bg text-white transition-colors duration-200">
  <!-- Main Container -->
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar-container">
      <!-- Sidebar content will be injected here -->
    </div>
    
    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col">
      <!-- Header -->
      <header id="header" class="header-container">
        <!-- Header content will be injected here -->
      </header>
      
      <!-- Chat Area -->
      <main id="chatArea" class="chat-area-container">
        <!-- Chat messages will be injected here -->
      </main>
      
      <!-- Input Box -->
      <div id="inputBox" class="input-box-container">
        <!-- Input box will be injected here -->
      </div>
    </div>
  </div>
  
  <!-- Settings Modal -->
  <div id="settingsModal" class="settings-modal hidden">
    <!-- Settings content will be injected here -->
  </div>
  
  <!-- Scripts -->
  <script type="module" src="/src/app.js"></script>
  
  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then((registration) => {
            console.log('✅ Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.error('❌ Service Worker registration failed:', error);
          });
      });
    }
  </script>
</body>
</html>
